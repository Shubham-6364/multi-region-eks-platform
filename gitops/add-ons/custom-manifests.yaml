apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: custom-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Codersdiary/multi-region-eks-platform.git'
    path: gitops/manifests
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true\n